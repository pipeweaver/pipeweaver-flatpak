app-id: io.github.pipeweaver
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm20
  - org.freedesktop.Sdk.Extension.node24
command: pipeweaver-daemon

finish-args:
  # Basic permissions most apps need
  - --socket=fallback-x11
  - --socket=wayland

  # Needs network access for the UI
  - --share=network

  # Access to PipeWire
  - --filesystem=xdg-run/pipewire-0

  # System tray icon
  - --talk-name=org.kde.StatusNotifierWatcher

  # Ability to check whether an autostart entry is present
  # This is needed because there's no way to check via a portal
  - --filesystem=xdg-config/autostart:ro

modules:
  - name: pipeweaver
    buildsystem: simple
    build-options:
      # Note on this, while I understand `flatpak-cargo-generator` exists, it does exactly the same as what
      # `cargo fetch --locked` does, which is download specific versions of the dependencies to create a reproducible
      # build.
      #
      # The downside, is that `flatpak-cargo-generator` requires devs and one-time contributors of this rust project
      # to not only have a python environment configured, but to remember to update the generated sources when the
      # dependencies change. While CI could be setup to generate the file automatically, it just adds to the mess.
      #
      # So I'm just going to enable network access on the sandbox, and pull the dependencies using Cargo, which will
      # create a reproducible build and 'just works' without any additional developer overhead.
      build-args: ["--share=network"]


      append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm20/bin:/usr/lib/sdk/node24/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm20/lib

      env:
        CARGO_HOME: /run/build/pipeweaver/cargo
    build-commands:
      - cargo fetch --locked --verbose
      - cargo build --locked --release --verbose
      - install -Dm755 ./target/release/pipeweaver-daemon -t /app/bin/
      - install -Dm644 io.github.pipeweaver.metainfo.xml /app/share/metainfo/io.github.pipeweaver.metainfo.xml
      - install -Dm644 io.github.pipeweaver.desktop /app/share/applications/io.github.pipeweaver.desktop
      - install -Dm644 daemon/resources/icons/pipeweaver.svg /app/share/icons/hicolor/scalable/apps/io.github.pipeweaver.svg
      - install -Dm644 daemon/resources/icons/pipeweaver-large.png /app/share/pixmaps/io.github.pipeweaver.png
      - install -Dm644 daemon/resources/icons/pipeweaver.png  /app/share/icons/hicolor/48x48/apps/io.github.pipeweaver.png

    sources:
      - type: git
        url: https://github.com/pipeweaver/pipeweaver
        branch: main
      - type: file
        path: io.github.pipeweaver.metainfo.xml
      - type: file
        path: io.github.pipeweaver.desktop
